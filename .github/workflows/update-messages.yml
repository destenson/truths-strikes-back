name: Update Messages

# Refreshes messages.json from the public archive feed and commits it so the
# static GitHub Pages site can read the data same-origin (no CORS, no
# client-side third-party requests).

on:
  schedule:
    # Every 30 minutes. GitHub may delay scheduled runs under load.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Avoid overlapping runs racing to commit.
concurrency:
  group: update-messages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch latest messages
        run: python3 scripts/fetch_messages.py

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain -- messages.json)" ]; then
            echo "No changes to messages.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add messages.json
          git commit -m "chore: update messages.json"
          git push
