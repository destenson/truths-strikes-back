name: Update Truths

# Refreshes truths.json from the public archive feed and commits it so the
# static GitHub Pages site can read the data same-origin (no CORS, no
# client-side third-party requests).

on:
  schedule:
    # Every 30 minutes. GitHub may delay scheduled runs under load.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Avoid overlapping runs racing to commit.
concurrency:
  group: update-truths
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest truths
        run: python3 scripts/fetch_truths.py

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain -- truths.json)" ]; then
            echo "No changes to truths.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add truths.json
          git commit -m "chore: update truths.json"
          git push
